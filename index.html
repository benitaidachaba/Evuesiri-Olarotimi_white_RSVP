<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evuesiri & Olarotimi — Special Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght=0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght=300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A96E;
      --gold-light: #E8D5B0;
      --gold-deep: #8B6F3A;
      --dark-espresso: #261E1A;
      --text-muted: #5C4E43;
      --bg-cream-smooth: #F6F2EC;   
      --bg-ivory-bright: #FDFDFB;   
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'Jost', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg-cream-smooth);
      color: var(--dark-espresso);
      min-height: 100vh;
      font-size: 18px; 
    }

    .form-section {
      padding: 6rem 1.5rem 7rem;
    }

    .section-header {
      text-align: center;
      margin-bottom: 4rem;
      max-width: 750px;
      margin-left: auto;
      margin-right: auto;
    }

    .section-eyebrow {
      font-family: var(--sans);
      font-size: 0.85rem; 
      font-weight: 600;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold-deep);
      margin-bottom: 1.25rem;
    }

    .section-title {
      font-family: var(--serif);
      font-size: clamp(2.5rem, 5vw, 3.8rem); 
      font-weight: 300;
      color: var(--dark-espresso);
      line-height: 1.2;
    }

    .section-title em {
      font-style: italic;
      color: var(--gold-deep);
    }

    .section-subtitle {
      font-family: var(--sans);
      font-size: 1.05rem; 
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 0.02em;
      margin-top: 1.5rem;
      line-height: 1.8;
    }

    .form-card {
      max-width: 720px; 
      margin: 0 auto;
      background: #FFFFFF;
      border: 1px solid rgba(139,111,58,0.18);
      padding: 4rem 3.5rem;
      position: relative;
      box-shadow: 0 10px 30px rgba(61,50,40,0.04);
    }

    .form-card::before, .form-card::after {
      content: '';
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: var(--gold-deep);
      border-style: solid;
      opacity: 0.5;
    }
    .form-card::before { top: 16px; left: 16px; border-width: 1px 0 0 1px; }
    .form-card::after { bottom: 16px; right: 16px; border-width: 0 1px 1px 0; }

    .field-group {
      margin-bottom: 2.5rem;
    }

    .field-group label {
      display: block;
      font-family: var(--sans);
      font-size: 0.85rem; 
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dark-espresso);
      margin-bottom: 1rem;
    }

    .field-group input[type="text"],
    .field-group input[type="tel"] {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(139,111,58,0.4);
      padding: 0.8rem 0;
      font-family: var(--serif);
      font-size: 1.3rem; 
      color: var(--dark-espresso);
      outline: none;
      transition: border-color 0.3s;
    }

    .field-group input:focus { border-bottom-color: var(--dark-espresso); }

    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      padding: 1.1rem 1.25rem; 
      border: 1px solid rgba(139,111,58,0.2);
      background: #FDFDFB;
      transition: all 0.25s ease;
    }

    .radio-option:hover {
      border-color: var(--dark-espresso);
      background: #FAF7F2;
    }

    .radio-option input[type="radio"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px; 
      height: 20px;
      border: 1px solid var(--gold-deep);
      border-radius: 50%;
      cursor: pointer;
      position: relative;
    }

    .radio-option input[type="radio"]:checked {
      background: var(--dark-espresso);
      border-color: var(--dark-espresso);
    }

    .radio-option input[type="radio"]:checked::after {
      content: '';
      position: absolute;
      inset: 5px;
      border-radius: 50%;
      background: #FFFFFF;
    }

    .radio-label {
      font-family: var(--sans);
      font-size: 1.15rem; 
      color: var(--dark-espresso);
    }

    .field-group textarea {
      width: 100%;
      background: #FDFDFB;
      border: 1px solid rgba(139,111,58,0.25);
      padding: 1.2rem;
      font-family: var(--serif);
      font-size: 1.2rem; 
      color: var(--dark-espresso);
      outline: none;
      resize: vertical;
      min-height: 120px;
    }

    .btn-submit {
      display: inline-block;
      padding: 1.3rem 3rem;
      font-family: var(--sans);
      font-size: 0.85rem; 
      font-weight: 600;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #FFFFFF;
      background: var(--dark-espresso);
      border: 1px solid var(--dark-espresso);
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }

    .btn-submit:hover {
      background: transparent;
      color: var(--dark-espresso);
    }

    .success-panel {
      display: none;
      text-align: center;
      padding: 5rem 1.5rem;
    }

    .success-panel.visible { display: block !important; }

    .success-icon { font-size: 3.5rem; margin-bottom: 2rem; color: var(--gold-deep); }
    .success-title { font-family: var(--serif); font-size: 3.5rem; font-weight: 300; font-style: italic; margin-bottom: 1.5rem; }
    .success-text { font-family: var(--sans); font-size: 1.25rem; color: var(--text-muted); line-height: 2; }
    .field-error { font-size: 0.85rem; font-weight: 600; color: #A03D3D; margin-top: 0.5rem; display: none; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #FFFFFF; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <section class="form-section">
    <div class="section-header">
      <p class="section-eyebrow">Evuesiri & Olarotimi</p>
      <h2 class="section-title">Additional <em>Information</em></h2>
      <p class="section-subtitle">Please fill out the form below to complete your details.</p>
    </div>

    <div class="form-card">
      <div class="success-panel" id="successPanel">
        <div class="success-icon">✦</div>
        <p class="success-title">Thank You</p>
        <p class="success-text">Your preferences have been updated successfully.</p>
      </div>

      <form id="secondForm" novalidate>
        <div class="field-group">
          <label for="fullName">Full Name *</label>
          <input type="text" id="fullName" placeholder="Your full name" required />
          <p class="field-error" id="err-fullName">Please enter your name.</p>
        </div>

        <div class="field-group">
          <label for="phone">Phone Number *</label>
          <input type="tel" id="phone" placeholder="+234 xxx xxx xxxx" required />
          <p class="field-error" id="err-phone">Please enter your phone number.</p>
        </div>

        <div class="field-group">
          <label>Please Select an Option *</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="selection" value="Option A" required />
              <span class="radio-label">Option A Gold Suite</span>
            </label>
            <label class="radio-option">
              <input type="radio" name="selection" value="Option B" />
              <span class="radio-label">Option B Ivory Suite</span>
            </label>
          </div>
          <p class="field-error" id="err-selection">Please select an option.</p>
        </div>

        <div class="field-group">
          <label for="notes">Additional Notes</label>
          <textarea id="notes" placeholder="Any details you'd like to share..."></textarea>
        </div>

        <div class="form-submit">
          <button type="submit" class="btn-submit" id="submitBtn">Submit Settings</button>
        </div>
      </form>
    </div>
  </section>

  <script>
    // Paste your Google Web App deployment link right here
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwDC0UGTrfPhglQPoSn215reJa6w-5s51YHd1gj2Wozo9_fGrnm4zwTZqz7i5RkXYG_Pw/exec";

    const form = document.getElementById('secondForm');
    const submitBtn = document.getElementById('submitBtn');
    const successPanel = document.getElementById('successPanel');

    function getVal(name) {
      const el = document.querySelector(`[name="${name}"]:checked`);
      return el ? el.value : '';
    }

    function showErr(id, show) {
      const el = document.getElementById('err-' + id);
      if (el) el.style.display = show ? 'block' : 'none';
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const name = document.getElementById('fullName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const selection = getVal('selection');

      let valid = true;
      showErr('fullName', !name); if(!name) valid = false;
      showErr('phone', !phone); if(!phone) valid = false;
      showErr('selection', !selection); if(!selection) valid = false;

      if (!valid) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>Saving...';

      const payload = {
        formType: "secondForm", // Essential flag to route to the correct sheet tab
        fullName: name,
        phone: phone,
        selection: selection,
        notes: document.getElementById('notes').value.trim(),
        timestamp: new Date().toLocaleString()
      };

      fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      })
      .then(() => {
        form.style.setProperty('display', 'none', 'important');
        successPanel.classList.add('visible');
      })
      .catch(err => {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit Settings';
        console.error(err);
      });
    });
  </script>
</body>
</html>
